<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 PREMIUM GAMES</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 2.2em;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
        }

        .header p {
            color: #94a3b8;
            font-size: 1em;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .game-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px 12px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #60a5fa;
            box-shadow: 0 20px 40px -10px #60a5fa40;
        }

        .game-emoji {
            font-size: 3.5em;
            margin-bottom: 12px;
            filter: drop-shadow(0 10px 8px rgba(0,0,0,0.3));
        }

        .game-title {
            color: white;
            font-weight: 700;
            font-size: 1.2em;
            margin-bottom: 4px;
        }

        .game-desc {
            color: #94a3b8;
            font-size: 0.85em;
        }

        .game-area {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 24px 16px;
            margin-top: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            color: white;
        }

        .game-header h2 {
            font-size: 1.5em;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
            font-size: 0.9em;
        }

        .back-btn:hover {
            background: #60a5fa;
        }

        .game-content {
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Игровые стили */
        .clicker-counter {
            font-size: 4em;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 30px #60a5fa;
            margin-bottom: 20px;
        }

        .clicker-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(145deg, #60a5fa, #c084fc);
            border: none;
            color: white;
            font-size: 2.5em;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 20px 40px -10px #60a5fa;
            transition: 0.1s;
            margin: 20px 0;
        }

        .clicker-btn:active {
            transform: scale(0.95);
        }

        .coin-board {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .coin {
            background: linear-gradient(145deg, #fbbf24, #f59e0b);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: 800;
            color: #1e293b;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 0 #b45309;
        }

        .coin:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #b45309;
        }

        .color-box {
            width: 150px;
            height: 150px;
            border-radius: 24px;
            margin: 20px;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 20px 30px -10px black;
        }

        .color-box:active {
            transform: scale(0.95);
        }

        .rgb-text {
            font-size: 1.5em;
            color: white;
            font-weight: 700;
            margin: 15px;
            font-family: monospace;
        }

        .dice {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .die {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            font-weight: 800;
            color: #1e293b;
            box-shadow: 0 15px 0 #94a3b8;
            transition: 0.2s;
        }

        .die:active {
            transform: translateY(7px);
            box-shadow: 0 8px 0 #94a3b8;
        }

        .timer {
            font-size: 3em;
            color: white;
            font-weight: 800;
            margin: 20px;
            font-family: monospace;
            text-shadow: 0 0 20px #60a5fa;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #334155;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #60a5fa, #c084fc);
            transition: width 0.1s;
        }

        .btn {
            background: linear-gradient(145deg, #60a5fa, #c084fc);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.2em;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 10px 20px -5px #60a5fa80;
            transition: 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .score {
            color: white;
            font-size: 1.3em;
            margin: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 PREMIUM GAMES</h1>
        <p>Выбери игру и покажи свой скилл</p>
    </div>

    <div class="games-grid">
        <div class="game-card" onclick="showGame('clicker')">
            <div class="game-emoji">🖱️</div>
            <div class="game-title">Clicker</div>
            <div class="game-desc">Тапай как бешеный</div>
        </div>
        <div class="game-card" onclick="showGame('coins')">
            <div class="game-emoji">🪙</div>
            <div class="game-title">Coin Collector</div>
            <div class="game-desc">Собери все монеты</div>
        </div>
        <div class="game-card" onclick="showGame('rgb')">
            <div class="game-emoji">🎨</div>
            <div class="game-title">RGB Challenge</div>
            <div class="game-desc">Угадай цвет</div>
        </div>
        <div class="game-card" onclick="showGame('dice')">
            <div class="game-emoji">🎲</div>
            <div class="game-title">Dice Duel</div>
            <div class="game-desc">Кость против кости</div>
        </div>
        <div class="game-card" onclick="showGame('reaction')">
            <div class="game-emoji">⚡</div>
            <div class="game-title">Reaction</div>
            <div class="game-desc">Проверь реакцию</div>
        </div>
    </div>

    <div class="game-area" id="gameArea" style="display: none;">
        <div class="game-header">
            <h2 id="gameTitle">Clicker</h2>
            <button class="back-btn" onclick="hideGame()">← Назад</button>
        </div>
        <div class="game-content" id="gameContent"></div>
    </div>

    <script>
        let currentGame = null;
        
        function showGame(game) {
            currentGame = game;
            document.getElementById('gameArea').style.display = 'block';
            document.querySelector('.games-grid').style.display = 'none';
            
            const titles = {
                clicker: '🖱️ Clicker',
                coins: '🪙 Coin Collector',
                rgb: '🎨 RGB Challenge',
                dice: '🎲 Dice Duel',
                reaction: '⚡ Reaction Game'
            };
            
            document.getElementById('gameTitle').textContent = titles[game];
            loadGame(game);
        }
        
        function hideGame() {
            document.getElementById('gameArea').style.display = 'none';
            document.querySelector('.games-grid').style.display = 'grid';
        }
        
        function loadGame(game) {
            const content = document.getElementById('gameContent');
            
            const games = {
                clicker: `
                    <div class="clicker-counter" id="counter">0</div>
                    <button class="clicker-btn" onclick="clickerClick()">👆</button>
                    <div class="score">Кликов: <span id="clicks">0</span></div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress" style="width: 0%"></div>
                    </div>
                    <button class="btn" onclick="resetClicker()">🔄 Сброс</button>
                `,
                
                coins: `
                    <div class="coin-board" id="coins">
                        <div class="coin" onclick="collectCoin(0)">🪙</div>
                        <div class="coin" onclick="collectCoin(1)">🪙</div>
                        <div class="coin" onclick="collectCoin(2)">🪙</div>
                        <div class="coin" onclick="collectCoin(3)">🪙</div>
                        <div class="coin" onclick="collectCoin(4)">🪙</div>
                    </div>
                    <div class="score">Собрано: <span id="collected">0</span>/5</div>
                    <div class="score" id="coinMessage"></div>
                    <button class="btn" onclick="resetCoins()">🔄 Новая игра</button>
                `,
                
                rgb: `
                    <div class="color-box" id="colorBox" onclick="checkColor()"></div>
                    <div class="rgb-text" id="rgbDisplay">RGB(0, 0, 0)</div>
                    <div class="score" id="rgbScore">Счет: 0</div>
                    <button class="btn" onclick="newRgbGame()">🎲 Случайный цвет</button>
                `,
                
                dice: `
                    <div class="dice">
                        <div class="die" onclick="rollDie(1)" id="die1">🎲</div>
                        <div class="die" onclick="rollDie(2)" id="die2">🎲</div>
                    </div>
                    <div class="score" id="diceResult"></div>
                    <div class="score" id="diceScore">Побед: 0</div>
                    <button class="btn" onclick="resetDice()">🔄 Сброс счета</button>
                `,
                
                reaction: `
                    <div class="timer" id="timer">0.000</div>
                    <div class="color-box" id="reactionBox" onclick="reactionClick()"></div>
                    <div class="score" id="reactionStatus">Жди зеленый...</div>
                    <div class="score" id="bestTime">Лучшее: 0.000с</div>
                    <button class="btn" onclick="startReaction()">▶️ Старт</button>
                `
            };
            
            content.innerHTML = games[game];
            
            // Инициализация игр
            if (game === 'clicker') initClicker();
            if (game === 'coins') initCoins();
            if (game === 'rgb') newRgbGame();
            if (game === 'reaction') initReaction();
        }
        
        // Clicker Game
        let clickCount = 0;
        function initClicker() {
            clickCount = 0;
            updateClicker();
        }
        
        function clickerClick() {
            clickCount++;
            updateClicker();
        }
        
        function updateClicker() {
            document.getElementById('clicks').textContent = clickCount;
            let progress = Math.min(clickCount * 2, 100);
            document.getElementById('progress').style.width = progress + '%';
            
            if (clickCount >= 50) {
                document.getElementById('counter').textContent = '🏆 WIN!';
            } else {
                document.getElementById('counter').textContent = clickCount;
            }
        }
        
        function resetClicker() {
            clickCount = 0;
            updateClicker();
        }
        
        // Coin Game
        let coins = [true, true, true, true, true];
        let collected = 0;
        
        function initCoins() {
            coins = [true, true, true, true, true];
            collected = 0;
            updateCoins();
        }
        
        function collectCoin(index) {
            if (coins[index]) {
                coins[index] = false;
                collected++;
                updateCoins();
                
                if (collected === 5) {
                    document.getElementById('coinMessage').textContent = '🎉 ТЫ СОБРАЛ ВСЕ!';
                }
            }
        }
        
        function updateCoins() {
            const coinDivs = document.querySelectorAll('.coin');
            for (let i = 0; i < 5; i++) {
                if (!coins[i]) {
                    coinDivs[i].style.opacity = '0.3';
                    coinDivs[i].style.pointerEvents = 'none';
                }
            }
            document.getElementById('collected').textContent = collected;
        }
        
        function resetCoins() {
            initCoins();
            document.getElementById('coinMessage').textContent = '';
            const coinDivs = document.querySelectorAll('.coin');
            coinDivs.forEach(coin => {
                coin.style.opacity = '1';
                coin.style.pointerEvents = 'auto';
            });
        }
        
        // RGB Game
        let rgbScore = 0;
        let currentColor = '';
        
        function randomColor() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            return {r, g, b, string: `rgb(${r}, ${g}, ${b})`};
        }
        
        function newRgbGame() {
            const color1 = randomColor();
            const color2 = randomColor();
            
            if (Math.random() > 0.5) {
                currentColor = color1.string;
                document.getElementById('rgbDisplay').textContent = `RGB(${color1.r}, ${color1.g}, ${color1.b})`;
                document.getElementById('colorBox').style.backgroundColor = color2.string;
            } else {
                currentColor = color2.string;
                document.getElementById('rgbDisplay').textContent = `RGB(${color2.r}, ${color2.g}, ${color2.b})`;
                document.getElementById('colorBox').style.backgroundColor = color1.string;
            }
        }
        
        function checkColor() {
            const boxColor = document.getElementById('colorBox').style.backgroundColor;
            if (boxColor === currentColor) {
                rgbScore += 10;
                document.getElementById('rgbScore').textContent = `Счет: ${rgbScore}`;
                newRgbGame();
            } else {
                alert('❌ Не угадал!');
                rgbScore = 0;
                document.getElementById('rgbScore').textContent = 'Счет: 0';
            }
        }
        
        // Dice Game
        let diceWins = 0;
        
        function rollDie(die) {
            const value = Math.floor(Math.random() * 6) + 1;
            const emojis = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            
            if (die === 1) {
                document.getElementById('die1').textContent = emojis[value-1];
                document.getElementById('die1').dataset.value = value;
            } else {
                document.getElementById('die2').textContent = emojis[value-1];
                document.getElementById('die2').dataset.value = value;
            }
            
            const val1 = parseInt(document.getElementById('die1')?.dataset?.value || 0);
            const val2 = parseInt(document.getElementById('die2')?.dataset?.value || 0);
            
            if (val1 && val2) {
                if (val1 > val2) {
                    diceWins++;
                    document.getElementById('diceResult').textContent = '🏆 Игрок 1 победил!';
                } else if (val2 > val1) {
                    diceWins++;
                    document.getElementById('diceResult').textContent = '🏆 Игрок 2 победил!';
                } else {
                    document.getElementById('diceResult').textContent = '🤝 Ничья!';
                }
                document.getElementById('diceScore').textContent = `Побед: ${diceWins}`;
            }
        }
        
        function resetDice() {
            diceWins = 0;
            document.getElementById('diceScore').textContent = 'Побед: 0';
            document.getElementById('die1').textContent = '🎲';
            document.getElementById('die2').textContent = '🎲';
            document.getElementById('diceResult').textContent = '';
        }
        
        // Reaction Game
        let reactionStart = 0;
        let reactionTimeout;
        let reactionBest = Infinity;
        let reactionActive = false;
        
        function initReaction() {
            reactionBest = Infinity;
            document.getElementById('bestTime').textContent = 'Лучшее: 0.000с';
        }
        
        function startReaction() {
            if (reactionTimeout) clearTimeout(reactionTimeout);
            
            const box = document.getElementById('reactionBox');
            box.style.backgroundColor = '#ef4444';
            document.getElementById('reactionStatus').textContent = 'Жди зеленый...';
            reactionActive = false;
            
            const delay = 2000 + Math.random() * 3000;
            
            reactionTimeout = setTimeout(() => {
                box.style.backgroundColor = '#22c55e';
                document.getElementById('reactionStatus').textContent = '⚡ ЖМИ!';
                reactionStart = Date.now();
                reactionActive = true;
            }, delay);
        }
        
        function reactionClick() {
            if (!reactionActive) {
                if (document.getElementById('reactionBox').style.backgroundColor === 'red') {
                    alert('⏰ Слишком рано!');
                    startReaction();
                }
                return;
            }
            
            const reactionTime = (Date.now() - reactionStart) / 1000;
            document.getElementById('timer').textContent = reactionTime.toFixed(3);
            document.getElementById('reactionStatus').textContent = `✅ Время: ${reactionTime.toFixed(3)}с`;
            
            if (reactionTime < reactionBest) {
                reactionBest = reactionTime;
                document.getElementById('bestTime').textContent = `Лучшее: ${reactionTime.toFixed(3)}с`;
            }
            
            reactionActive = false;
            startReaction();
        }
    </script>
</body>
</html>
