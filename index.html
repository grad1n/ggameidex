<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎮 ARCADE ZONE</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#050a18;min-height:100vh;overflow-x:hidden;font-family:'Segoe UI',system-ui,sans-serif;touch-action:manipulation}
.stars-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d,3s) var(--delay,0s) infinite}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.9;transform:scale(1.4)}}
.container{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:16px}
.header{text-align:center;padding:24px 0 28px}
.header h1{font-size:2.6em;font-weight:900;background:linear-gradient(135deg,#00d2ff,#7b2ff7,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;animation:hglow 3s ease-in-out infinite}
@keyframes hglow{0%,100%{filter:drop-shadow(0 0 20px #7b2ff780)}50%{filter:drop-shadow(0 0 40px #00d2ff80)}}
.header p{color:#4a5568;font-size:.95em;letter-spacing:.5px}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;margin-bottom:24px}
.game-card{position:relative;overflow:hidden;background:linear-gradient(145deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:22px 12px;text-align:center;cursor:pointer;transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.game-card::after{content:'';position:absolute;inset:0;background:var(--hover-bg,linear-gradient(135deg,#00d2ff15,#7b2ff715));opacity:0;transition:opacity .3s;border-radius:22px}
.game-card:hover{transform:translateY(-8px) scale(1.02);border-color:var(--c,#00d2ff);box-shadow:0 24px 48px -10px var(--s,#00d2ff40)}
.game-card:hover::after{opacity:1}
.game-emoji{font-size:3em;margin-bottom:10px;filter:drop-shadow(0 6px 12px rgba(0,0,0,.5));display:block}
.game-title{color:#e2e8f0;font-weight:700;font-size:1em;margin-bottom:4px}
.game-desc{color:#475569;font-size:.75em}
.badge{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#1a0a00;font-size:.58em;font-weight:800;padding:2px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:.5px}
.game-area{background:linear-gradient(145deg,rgba(5,10,24,.97),rgba(10,18,36,.97));border:1px solid rgba(255,255,255,.08);border-radius:28px;overflow:hidden;box-shadow:0 30px 80px -20px rgba(0,0,0,.9)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02)}
.topbar h2{color:#e2e8f0;font-size:1.15em;font-weight:700}
.back-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#8892b0;padding:8px 18px;border-radius:12px;font-size:.85em;font-weight:600;cursor:pointer;transition:.2s}
.back-btn:hover{background:rgba(255,255,255,.14);color:white}
.gcontent{padding:24px 16px;min-height:440px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.btn{background:linear-gradient(135deg,#00d2ff,#7b2ff7);border:none;color:white;padding:13px 34px;border-radius:14px;font-weight:700;font-size:.95em;cursor:pointer;box-shadow:0 8px 24px -5px #7b2ff760;transition:.2s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.15);opacity:0;transition:.2s}
.btn:hover::before{opacity:1}
.btn:active{transform:scale(.95)}
.btn-sm{padding:9px 22px;font-size:.82em;border-radius:10px}
.btn-ghost{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#8892b0;box-shadow:none}
.btn-ghost:hover{background:rgba(255,255,255,.13);color:white}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.stat-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px 18px;text-align:center;min-width:80px}
.stat-val{color:white;font-size:1.7em;font-weight:800;line-height:1}
.stat-lbl{color:#475569;font-size:.7em;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
/* ---- CLICKER ---- */
.click-num{font-size:3.8em;font-weight:900;color:white;text-shadow:0 0 40px #7b2ff780}
.click-sub{color:#475569;font-size:.85em;margin-bottom:8px}
.clicker-btn{width:175px;height:175px;border-radius:50%;background:linear-gradient(145deg,#00d2ff,#7b2ff7);border:none;font-size:2.8em;cursor:pointer;box-shadow:0 0 0 10px rgba(123,47,247,.2),0 24px 50px -10px #7b2ff780;transition:transform .08s;animation:pulsebtn 2s ease-in-out infinite}
@keyframes pulsebtn{0%,100%{box-shadow:0 0 0 10px rgba(123,47,247,.2),0 24px 50px -10px #7b2ff780}50%{box-shadow:0 0 0 20px rgba(0,210,255,.08),0 24px 50px -10px #00d2ff80}}
.clicker-btn:active{transform:scale(.92);animation:none;box-shadow:0 6px 20px -5px #7b2ff780}
.combo-badge{font-size:1.1em;font-weight:700;color:#fbbf24;min-height:26px;animation:comboPop .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes comboPop{from{transform:scale(.8)}to{transform:scale(1)}}
.upgrades{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;margin-top:8px}
.upg{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;transition:.2s}
.upg:hover{background:rgba(255,255,255,.1);border-color:#7b2ff7}
.upg.bought{opacity:.45;cursor:default;border-color:#22c55e;background:rgba(34,197,94,.08)}
.upg .ui{font-size:1.8em;display:block}
.upg .un{color:#8892b0;font-size:.7em;margin-top:3px}
.upg .uc{color:#fbbf24;font-weight:700;font-size:.8em}
/* ---- COIN RUSH ---- */
.coin-field{position:relative;width:300px;height:260px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden}
.c-timer-bar{width:100%;height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.c-timer-fill{height:100%;background:linear-gradient(90deg,#22c55e,#fbbf24,#ef4444);border-radius:4px;transition:width .1s linear}
.coin-i{position:absolute;font-size:2em;cursor:pointer;animation:coinPop .25s cubic-bezier(.34,1.56,.64,1) forwards;user-select:none;transition:transform .08s}
.coin-i:active{transform:scale(.75)}
@keyframes coinPop{from{transform:scale(0) rotate(-180deg)}to{transform:scale(1) rotate(0)}}
/* ---- COLOR GENIUS ---- */
.color-target{width:130px;height:130px;border-radius:22px;box-shadow:0 20px 50px -10px rgba(0,0,0,.9);transition:background .3s}
.rgb-code{font-family:monospace;font-size:1.3em;color:#e2e8f0;font-weight:700;letter-spacing:1px}
.color-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:310px}
.color-opt{height:68px;border-radius:14px;border:3px solid rgba(255,255,255,.1);cursor:pointer;transition:.18s;box-shadow:0 10px 20px -5px rgba(0,0,0,.5)}
.color-opt:hover{transform:scale(1.04);border-color:rgba(255,255,255,.35)}
.color-opt.correct{border-color:#22c55e!important;box-shadow:0 0 0 4px #22c55e40!important;animation:cPulse .35s}
.color-opt.wrong{border-color:#ef4444!important;box-shadow:0 0 0 4px #ef444440!important;animation:cShake .3s}
@keyframes cPulse{0%{transform:scale(1)}50%{transform:scale(1.09)}100%{transform:scale(1)}}
@keyframes cShake{0%,100%{transform:translateX(0)}30%{transform:translateX(-8px)}70%{transform:translateX(8px)}}
.ctimer-ring{position:relative;width:58px;height:58px}
.ctimer-ring svg{transform:rotate(-90deg)}
.tr-bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:4}
.tr-fill{fill:none;stroke:#00d2ff;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .1s linear,stroke .2s}
.tr-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:1.05em}
/* ---- MEMORY ---- */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:320px}
.mcard{width:70px;height:70px;perspective:600px;cursor:pointer}
.mcard-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.mcard.flipped .mcard-inner,.mcard.matched .mcard-inner{transform:rotateY(180deg)}
.mcard.matched .cf{border-color:#22c55e;box-shadow:0 0 16px #22c55e50}
.mcard.shake .mcard-inner{animation:mshake .4s}
@keyframes mshake{0%,100%{transform:rotateY(180deg)}25%{transform:rotateY(180deg) translateX(-6px)}75%{transform:rotateY(180deg) translateX(6px)}}
.cb,.cf{position:absolute;inset:0;border-radius:13px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;font-size:2em}
.cb{background:linear-gradient(135deg,#1e1b4b,#312e81);border:2px solid rgba(255,255,255,.09)}
.cb::after{content:'?';color:rgba(255,255,255,.25);font-weight:700;font-size:.9em}
.cf{background:linear-gradient(135deg,#1e293b,#0f172a);border:2px solid rgba(255,255,255,.12);transform:rotateY(180deg)}
/* ---- SNAKE ---- */
canvas.snake{border-radius:16px;border:2px solid rgba(255,255,255,.1);display:block;box-shadow:0 20px 50px -10px rgba(0,0,0,.9)}
.d-pad{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto;gap:7px;margin-top:14px}
.dp{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:white;font-size:1.3em;padding:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;user-select:none;-webkit-user-select:none}
.dp:active{background:rgba(255,255,255,.22);transform:scale(.9)}
.dp-up{grid-column:2;grid-row:1}
.dp-left{grid-column:1;grid-row:2}
.dp-dn{grid-column:2;grid-row:2}
.dp-rt{grid-column:3;grid-row:2}
/* ---- REACTION ---- */
.rpad{width:210px;height:210px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:3em;transition:background .1s,transform .1s;margin:14px auto}
.rpad.idle{background:radial-gradient(circle,#1e293b,#0f172a);box-shadow:0 20px 50px -10px rgba(0,0,0,.9);color:#334155}
.rpad.wait{background:radial-gradient(circle,#ef4444,#b91c1c);box-shadow:0 20px 50px -10px #ef444470;animation:rpulse .6s ease-in-out infinite}
.rpad.go{background:radial-gradient(circle,#22c55e,#15803d);box-shadow:0 0 60px #22c55e60;animation:rgo .3s ease-out}
@keyframes rpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes rgo{0%{box-shadow:0 0 0 0 #22c55e80}100%{box-shadow:0 0 0 50px transparent}}
.rpad:active{transform:scale(.94)}
.r-hist{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.r-chip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 12px;color:#8892b0;font-size:.78em;font-weight:600;font-family:monospace}
.r-chip.best{border-color:#fbbf24;color:#fbbf24}
/* ---- DICE ---- */
.dice-arena{display:flex;align-items:center;gap:24px;margin:14px 0}
.dice-player{text-align:center}
.dp-name{color:#475569;font-size:.75em;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.die{width:95px;height:95px;background:white;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:3.8em;cursor:pointer;box-shadow:0 10px 0 #94a3b8,0 15px 25px rgba(0,0,0,.5);transition:transform .1s,box-shadow .1s;user-select:none}
.die:active{transform:translateY(7px);box-shadow:0 3px 0 #94a3b8,0 5px 10px rgba(0,0,0,.5)}
.die.roll{animation:droll .5s ease-out}
@keyframes droll{0%{transform:rotate(0) scale(1)}25%{transform:rotate(90deg) scale(1.1)}50%{transform:rotate(180deg) scale(1)}75%{transform:rotate(270deg) scale(1.1)}100%{transform:rotate(360deg) scale(1)}}
.vs{font-size:2em;font-weight:900;color:#ef4444;text-shadow:0 0 20px #ef444460}
.dice-msg{font-size:1.2em;font-weight:700;color:white;min-height:34px;text-align:center}
/* ---- TOAST ---- */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:11px 24px;color:white;font-weight:600;font-size:.88em;z-index:9999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;box-shadow:0 20px 40px rgba(0,0,0,.6)}
.toast.show{transform:translateX(-50%) translateY(0)}
/* ---- PARTICLE ---- */
.particle{position:fixed;pointer-events:none;font-weight:800;color:#fbbf24;animation:pfly .7s ease-out forwards;z-index:9998;font-size:1em}
@keyframes pfly{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-130px) scale(.4);opacity:0}}
@media(max-width:380px){
  .games-grid{grid-template-columns:repeat(2,1fr)}
  .mem-grid{max-width:270px}
  .mcard{width:59px;height:59px}
  .cf,.cb{font-size:1.7em}
  .clicker-btn{width:150px;height:150px;font-size:2.4em}
  .coin-field{width:268px;height:230px}
}
</style>
</head>
<body>
<div class="stars-bg" id="starsContainer"></div>
<div class="container">
  <div class="header">
    <h1>🕹️ ARCADE ZONE</h1>
    <p>7 игр · рекорды · звуки · частицы</p>
  </div>
  <div class="games-grid" id="gamesGrid">
    <div class="game-card" style="--c:#fbbf24;--s:#fbbf2440;--hover-bg:linear-gradient(135deg,#fbbf2415,#f59e0b15)" onclick="showGame('clicker')">
      <span class="game-emoji">🖱️</span>
      <div class="game-title">Mega Clicker</div>
      <div class="game-desc">Апгрейды, комбо, частицы</div>
    </div>
    <div class="game-card" style="--c:#f59e0b;--s:#f59e0b40" onclick="showGame('coinrush')">
      <span class="game-emoji">🪙</span>
      <div class="game-title">Coin Rush</div>
      <div class="game-desc">Собери монеты за 30с</div>
      <div class="badge">⚡ Hot</div>
    </div>
    <div class="game-card" style="--c:#00d2ff;--s:#00d2ff40" onclick="showGame('color')">
      <span class="game-emoji">🎨</span>
      <div class="game-title">Color Genius</div>
      <div class="game-desc">Угадай из 4 вариантов</div>
    </div>
    <div class="game-card" style="--c:#a78bfa;--s:#a78bfa40" onclick="showGame('memory')">
      <span class="game-emoji">🧠</span>
      <div class="game-title">Memory Match</div>
      <div class="game-desc">Найди все пары</div>
      <div class="badge">🆕 New</div>
    </div>
    <div class="game-card" style="--c:#22c55e;--s:#22c55e40" onclick="showGame('snake')">
      <span class="game-emoji">🐍</span>
      <div class="game-title">Snake</div>
      <div class="game-desc">Классика на canvas</div>
      <div class="badge">🆕 New</div>
    </div>
    <div class="game-card" style="--c:#ef4444;--s:#ef444440" onclick="showGame('reaction')">
      <span class="game-emoji">⚡</span>
      <div class="game-title">Reaction</div>
      <div class="game-desc">История + рекорды</div>
    </div>
    <div class="game-card" style="--c:#e2e8f0;--s:#e2e8f040" onclick="showGame('dice')">
      <span class="game-emoji">🎲</span>
      <div class="game-title">Dice Battle</div>
      <div class="game-desc">Бой против ИИ</div>
    </div>
  </div>
  <div class="game-area" id="gameArea" style="display:none">
    <div class="topbar">
      <h2 id="gameTitle"></h2>
      <button class="back-btn" onclick="hideGame()">← Назад</button>
    </div>
    <div class="gcontent" id="gameContent"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
// ============== STARS ==============
(function(){
  const c=document.getElementById('starsContainer');
  for(let i=0;i<80;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*2.5+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s`;
    c.appendChild(s);
  }
})();

// ============== AUDIO ==============
let actx;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function playTone(f,t='sine',d=.12,v=.25){
  try{
    const ctx=ac(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=t;o.frequency.setValueAtTime(f,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(f*.7,ctx.currentTime+d);
    g.gain.setValueAtTime(v,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);
    o.start();o.stop(ctx.currentTime+d);
  }catch(e){}
}
function playClick(){playTone(880,'sine',.08,.2)}
function playCoin(){playTone(1200,'sine',.15,.3);setTimeout(()=>playTone(1600,'sine',.1,.2),80)}
function playSuccess(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',.15,.3),i*80))}
function playFail(){playTone(220,'sawtooth',.3,.2)}
function playPop(){playTone(440,'triangle',.06,.15)}

// ============== TOAST ==============
let toastTimer;
function toast(msg,d=2200){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),d);
}

// ============== PARTICLES ==============
function spawnParticle(x,y,text,color='#fbbf24'){
  const p=document.createElement('div');
  p.className='particle';
  p.textContent=text;
  p.style.cssText=`left:${x}px;top:${y}px;color:${color}`;
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),700);
}
function spawnBurst(x,y,count=6){
  const colors=['#fbbf24','#00d2ff','#7b2ff7','#22c55e','#f472b6','#fb923c'];
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const p=document.createElement('div');
      p.className='particle';
      p.style.cssText=`left:${x+Math.random()*40-20}px;top:${y+Math.random()*20-10}px;color:${colors[i%colors.length]};font-size:.7em`;
      p.textContent=['★','✦','◆','●','▲'][Math.floor(Math.random()*5)];
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),700);
    },i*30);
  }
}

// ============== GAME ROUTER ==============
let currentGame=null;
let gameTimers=[];

const TITLES={
  clicker:'🖱️ Mega Clicker',
  coinrush:'🪙 Coin Rush',
  color:'🎨 Color Genius',
  memory:'🧠 Memory Match',
  snake:'🐍 Snake',
  reaction:'⚡ Reaction',
  dice:'🎲 Dice Battle'
};

function showGame(g){
  currentGame=g;
  clearAllTimers();
  document.getElementById('gamesGrid').style.display='none';
  const ga=document.getElementById('gameArea');
  ga.style.display='block';
  document.getElementById('gameTitle').textContent=TITLES[g];
  ({clicker:initClicker,coinrush:initCoinRush,color:initColor,memory:initMemory,snake:initSnake,reaction:initReaction,dice:initDice}[g])();
}
function hideGame(){
  clearAllTimers();
  if(currentGame==='snake')stopSnake();
  currentGame=null;
  document.getElementById('gamesGrid').style.display='grid';
  document.getElementById('gameArea').style.display='none';
}
function clearAllTimers(){
  gameTimers.forEach(t=>{clearInterval(t);clearTimeout(t)});
  gameTimers=[];
}
function gc(){return document.getElementById('gameContent')}
function gt(id){return document.getElementById(id)}
function setHTML(html){gc().innerHTML=html}
function gls(k,def){try{return JSON.parse(localStorage.getItem(k))??def}catch{return def}}
function sls(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// ╔══════════════════════════╗
// ║      MEGA CLICKER        ║
// ╚══════════════════════════╝
let cClicks=0,cMult=1,cAuto=0,cCombo=0,cComboTimer;
const UPGRADES=[
  {id:'u1',icon:'🔥',name:'Двойной клик',desc:'x2',cost:50,bought:false,apply:()=>{cMult=2}},
  {id:'u2',icon:'⚡',name:'Авто-клик',desc:'+1/с',cost:100,bought:false,apply:()=>{cAuto+=1}},
  {id:'u3',icon:'💎',name:'Мега клик',desc:'x5',cost:300,bought:false,apply:()=>{cMult=5}},
  {id:'u4',icon:'🚀',name:'Авто x3',desc:'+3/с',cost:500,bought:false,apply:()=>{cAuto+=3}},
  {id:'u5',icon:'🌟',name:'Супер x10',desc:'x10',cost:1000,bought:false,apply:()=>{cMult=10}},

function initClicker(){

function renderClicker(){

function renderUpgrades(){

function doClick(e){
  cClicks+=cMult;
  clearTimeout(cComboTimer);
  cCombo++;
  playClick();
  const btn=gt('cBtn');
  btn.style.transform='scale(.91)';
  setTimeout(()=>btn.style.transform='',80);
  const rect=btn.getBoundingClientRect();
  const ex=e.clientX||rect.left+rect.width/2;
  const ey=e.clientY||rect.top+20;
  spawnParticle(ex,ey,`+${cMult}`,'#fbbf24');
  if(cCombo>=5){
    const bonus=cMult*cCombo;
    cClicks+=bonus;
    spawnParticle(ex,ey-30,`COMBO x${cCombo}!`,'#00d2ff');
    spawnBurst(ex,ey,4);
    playTone(1400,'sine',.1,.3);
  }
  cComboTimer=setTimeout(()=>{cCombo=0;updateClickerStats()},1200);
  updateClickerStats();
}
function updateClickerStats(){
  const el=gt('cNum');
  if(el)el.textContent=fmtNum(cClicks);
  const cb=gt('cCombo');
  if(cb){
    cb.textContent=cCombo>=3?`🔥 COMBO x${cCombo}!`:cCombo>=2?`⚡ Combo x${cCombo}`:'';
    if(cCombo>=3){cb.style.color='#ef4444'}else{cb.style.color='#fbbf24'}
  }
}
function buyUpgrade(id){
  const u=UPGRADES.find(x=>x.id===id);
  if(!u||u.bought)return;
  if(cClicks<u.cost){toast(`Нужно ${u.cost}💎, у тебя ${fmtNum(cClicks)}`);playFail();return;}
  cClicks-=u.cost;u.bought=true;u.apply();
  playSuccess();
  spawnBurst(200,300,8);
  toast(`✅ ${u.name} куплен!`);
  updateClickerStats();
  renderUpgrades();
}
function fmtNum(n){
  if(n>=1e9)return(n/1e9).toFixed(1)+'B';
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return n;
}

let coinScore=0,coinBest=0,coinActive=false,coinTimeLeft=30;

function startCoinRush(){
  if(coinActive)return;
  coinActive=true;coinScore=0;coinTimeLeft=30;
  gt('crStartBtn').style.display='none';
  const field=gt('coinField');
  field.innerHTML='';
  const COINS=['🪙','🪙','🪙','💰','⭐'];
  const VALS=[1,1,1,3,5];
  function spawnCoin(){
    if(!coinActive)return;
    const i=Math.floor(Math.random()*COINS.length);
    const coin=document.createElement('div');
    coin.className='coin-i';
    coin.textContent=COINS[i];
    const fw=field.offsetWidth-40,fh=field.offsetHeight-40;
    coin.style.cssText=`left:${Math.random()*fw+8}px;top:${Math.random()*fh+8}px`;
    coin.onclick=(e)=>{
      if(!coinActive)return;
      coinScore+=VALS[i];
      gt('crScore').textContent=coinScore;
      playCoin();
      spawnParticle(e.clientX,e.clientY,`+${VALS[i]}`,'#fbbf24');
      coin.remove();
      spawnCoin();
    };
    field.appendChild(coin);
    setTimeout(()=>{if(coin.parentNode){coin.remove();if(coinActive)spawnCoin();}},2000+Math.random()*1500);
  }
  for(let i=0;i<4;i++)setTimeout(spawnCoin,i*300);
  const t=setInterval(()=>{

      gt('crBest').textContent=coinBest;

    }
  },1000);

}

let cgScore=0,cgStreak=0,cgBest=0,cgTarget,cgOpts,cgTLeft,cgTTimer,cgCanAns;
function initColor(){
  cgBest=gls('cgBest',0);
  cgScore=0;cgStreak=0;
  setHTML(`
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="cgScore">0</div><div class="stat-lbl">Очки</div></div>
      <div class="stat-box"><div class="stat-val" id="cgStreak">0</div><div class="stat-lbl">Серия</div></div>
      <div class="stat-box"><div class="stat-val" id="cgBest">${cgBest}</div><div class="stat-lbl">Рекорд</div></div>
    </div>
    <div class="ctimer-ring">
      <svg width="58" height="58" viewBox="0 0 58 58">
        <circle class="tr-bg" cx="29" cy="29" r="25"/>
        <circle class="tr-fill" id="cgRing" cx="29" cy="29" r="25" stroke-dasharray="157" stroke-dashoffset="0"/>
      </svg>
      <div class="tr-num" id="cgTNum">5</div>
    </div>
    <div class="color-target" id="cgTarget"></div>
    <div class="rgb-code" id="cgRgb"></div>
    <div class="color-opts" id="cgOpts"></div>
  `);
  newColorRound();
}
function rndRgb(){return[Math.floor(Math.random()*256),Math.floor(Math.random()*256),Math.floor(Math.random()*256)]}
function rgbStr(c){return`rgb(${c[0]},${c[1]},${c[2]})`}
function rgbLabel(c){return`rgb(${c[0]}, ${c[1]}, ${c[2]})`}
function newColorRound(){
  clearTimeout(cgTTimer);
  cgCanAns=true;
  cgTarget=rndRgb();
  const decoys=[rndRgb(),rndRgb(),rndRgb()];
  const allOpts=[cgTarget,...decoys];
  cgOpts=allOpts.sort(()=>Math.random()-.5);
  const el=gt('cgTarget');
  if(el)el.style.background=rgbStr(cgTarget);
  const rb=gt('cgRgb');
  if(rb)rb.textContent=rgbLabel(cgTarget);
  const op=gt('cgOpts');
  if(op)op.innerHTML=cgOpts.map((c,i)=>`<div class="color-opt" id="cgo${i}" style="background:${rgbStr(c)}" onclick="answerColor(${i})"></div>`).join('');
  startCgTimer();
}
function startCgTimer(){
  cgTLeft=7;
  updateCgTimer();
  cgTTimer=setInterval(()=>{
    cgTLeft--;
    updateCgTimer();
    if(cgTLeft<=0){
      clearInterval(cgTTimer);
      if(cgCanAns){cgCanAns=false;missColor();}
    }
  },1000);
  gameTimers.push(cgTTimer);
}
function updateCgTimer(){
  const n=gt('cgTNum'),r=gt('cgRing');
  if(n)n.textContent=cgTLeft;
  if(r){
    const pct=cgTLeft/7;
    r.style.strokeDashoffset=157*(1-pct);
    r.style.stroke=cgTLeft>3?'#00d2ff':cgTLeft>1?'#fbbf24':'#ef4444';
  }
}
function answerColor(i){
  if(!cgCanAns)return;
  cgCanAns=false;
  clearInterval(cgTTimer);
  const chosen=cgOpts[i];
  const isCorrect=chosen[0]===cgTarget[0]&&chosen[1]===cgTarget[1]&&chosen[2]===cgTarget[2];
  const el=gt('cgo'+i);
  if(isCorrect){
    el.classList.add('correct');
    cgStreak++;
    const pts=10+cgStreak*2;
    cgScore+=pts;
    if(cgScore>cgBest){cgBest=cgScore;sls('cgBest',cgBest);}
    playSuccess();
    const r=el.getBoundingClientRect();
    spawnParticle(r.left+r.width/2,r.top,`+${pts}`,'#22c55e');
    gt('cgScore').textContent=cgScore;
    gt('cgStreak').textContent=cgStreak;
    gt('cgBest').textContent=cgBest;
    setTimeout(newColorRound,800);
  }else{
    el.classList.add('wrong');
    cgOpts.forEach((c,j)=>{
      if(c[0]===cgTarget[0]&&c[1]===cgTarget[1]&&c[2]===cgTarget[2]){
        const correctEl=gt('cgo'+j);
        if(correctEl)correctEl.classList.add('correct');
      }
    });
    cgStreak=0;
    gt('cgStreak').textContent=0;
    playFail();
    setTimeout(newColorRound,1000);
  }
}
function missColor(){
  cgStreak=0;
  gt('cgStreak').textContent=0;
  playFail();
  toast('⏰ Время вышло!');
  setTimeout(newColorRound,800);
}

const MEM_EMOJIS=['🦊','🐶','🐱','🐭','🐹','🐰','🦁','🐯'];
let memCards=[],memFlipped=[],memMatched=0,memMoves=0,memStart=0,memLock=false,memTimerEl,memTimerInterval;
function initMemory(){
  const pairs=[...MEM_EMOJIS,...MEM_EMOJIS].sort(()=>Math.random()-.5);
  memCards=pairs;memFlipped=[];memMatched=0;memMoves=0;memStart=Date.now();memLock=false;
  setHTML(`
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="mmMoves">0</div><div class="stat-lbl">Ходы</div></div>

  memTimerInterval=setInterval(()=>{
    const el=gt('mmTime');
    if(el)el.textContent=Math.floor((Date.now()-memStart)/1000);
  },500);

function renderMemGrid(){
  const g=gt('memGrid');
  if(!g)return;
  g.innerHTML=memCards.map((e,i)=>`
    <div class="mcard" id="mc${i}" onclick="flipCard(${i})">
      <div class="mcard-inner">
        <div class="cb"></div>
        <div class="cf">${e}</div>
      </div>
    </div>
  `).join('');
}
function flipCard(i){
  if(memLock)return;
  const card=gt('mc'+i);
  if(!card||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');
  playPop();
  memFlipped.push(i);
  if(memFlipped.length===2){
    memMoves++;
    gt('mmMoves').textContent=memMoves;
    memLock=true;
    const[a,b]=memFlipped;
    if(memCards[a]===memCards[b]){
      gt('mc'+a).classList.add('matched');
      gt('mc'+b).classList.add('matched');
      memMatched++;
      gt('mmMatched').textContent=memMatched+'/8';
      playCoin();
      memFlipped=[];
      memLock=false;
      if(memMatched===8){
        clearInterval(memTimerInterval);
        const t=Math.floor((Date.now()-memStart)/1000);
        setTimeout(()=>{
          playSuccess();
          toast(`🏆 Победа! ${memMoves} ходов за ${t}с`);
        },300);
      }
    }else{
      playFail();
      setTimeout(()=>{
        const ca=gt('mc'+a),cb2=gt('mc'+b);
        if(ca)ca.classList.remove('flipped');
        if(cb2)cb2.classList.remove('flipped');
        memFlipped=[];
        memLock=false;
      },900);
    }
  }
}

let snakeGame={running:false,snake:[],dir:{x:1,y:0},food:{},score:0,speed:150,loop:null,canvas:null,ctx:null};
const SZ=20,COLS=15,ROWS=15;
function initSnake(){
  setHTML(`
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="snScore">0</div><div class="stat-lbl">Счёт</div></div>
      <div class="stat-box"><div class="stat-val" id="snBest">${gls('snakeBest',0)}</div><div class="stat-lbl">Рекорд</div></div>
    </div>
    <canvas class="snake" id="snCanvas" width="${COLS*SZ}" height="${ROWS*SZ}"></canvas>
    <div class="d-pad">
      <button class="dp dp-up" ontouchstart="snDir(0,-1)" onclick="snDir(0,-1)">▲</button>
      <button class="dp dp-left" ontouchstart="snDir(-1,0)" onclick="snDir(-1,0)">◄</button>
      <button class="dp dp-dn" ontouchstart="snDir(0,1)" onclick="snDir(0,1)">▼</button>
      <button class="dp dp-rt" ontouchstart="snDir(1,0)" onclick="snDir(1,0)">►</button>
    </div>
    <button class="btn" id="snBtn" onclick="startSnake()">▶️ Старт</button>
  `);
  snakeGame.canvas=gt('snCanvas');
  snakeGame.ctx=snakeGame.canvas.getContext('2d');
  drawSnakeIdle();
  document.addEventListener('keydown',snakeKey);
}
function drawSnakeIdle(){
  const ctx=snakeGame.ctx;
  ctx.fillStyle='#0a0f1e';
  ctx.fillRect(0,0,COLS*SZ,ROWS*SZ);
  ctx.fillStyle='rgba(0,210,255,.15)';
  for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++){
    if((x+y)%2===0)ctx.fillRect(x*SZ,y*SZ,SZ,SZ);
  }
  ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.font='bold 14px sans-serif';
  ctx.textAlign='center';
  ctx.fillText('Нажми Старт',COLS*SZ/2,ROWS*SZ/2);
}
function startSnake(){
  gt('snBtn').style.display='none';
  snakeGame.snake=[{x:7,y:7},{x:6,y:7},{x:5,y:7}];
  snakeGame.dir={x:1,y:0};
  snakeGame.score=0;
  snakeGame.speed=150;
  gt('snScore').textContent=0;
  placeFood();
  snakeGame.running=true;
  if(snakeGame.loop)clearInterval(snakeGame.loop);
  snakeGame.loop=setInterval(tickSnake,snakeGame.speed);
  gameTimers.push(snakeGame.loop);
}
function stopSnake(){
  snakeGame.running=false;
  clearInterval(snakeGame.loop);
  document.removeEventListener('keydown',snakeKey);
}
function placeFood(){
  let pos;
  do{pos={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}}
  while(snakeGame.snake.some(s=>s.x===pos.x&&s.y===pos.y));
  snakeGame.food=pos;
}
let snNextDir=null;
function snDir(x,y){
  const d=snakeGame.dir;
  if(d.x===0&&x!==0)snNextDir={x,y};
  if(d.y===0&&y!==0)snNextDir={x,y};
}
function snakeKey(e){
  const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
  if(map[e.key]){e.preventDefault();const d=map[e.key];const c=snakeGame.dir;if(c.x===0&&d.x!==0)snNextDir=d;if(c.y===0&&d.y!==0)snNextDir=d;}
}
function tickSnake(){
  if(!snakeGame.running)return;
  if(snNextDir){snakeGame.dir=snNextDir;snNextDir=null;}
  const head={x:snakeGame.snake[0].x+snakeGame.dir.x,y:snakeGame.snake[0].y+snakeGame.dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snakeGame.snake.some(s=>s.x===head.x&&s.y===head.y)){
    snakeGame.running=false;
    clearInterval(snakeGame.loop);
    playFail();
    const best=gls('snakeBest',0);
    if(snakeGame.score>best){sls('snakeBest',snakeGame.score);gt('snBest').textContent=snakeGame.score;}
    toast(`💀 Игра окончена! Счёт: ${snakeGame.score}`);
    const btn=gt('snBtn');
    if(btn){btn.style.display='';btn.textContent='🔄 Снова';}
    drawSnake(true);
    return;
  }
  snakeGame.snake.unshift(head);
  if(head.x===snakeGame.food.x&&head.y===snakeGame.food.y){
    snakeGame.score++;
    gt('snScore').textContent=snakeGame.score;
    playCoin();
    placeFood();
    if(snakeGame.score%5===0&&snakeGame.speed>60){
      snakeGame.speed=Math.max(60,snakeGame.speed-15);
      clearInterval(snakeGame.loop);
      snakeGame.loop=setInterval(tickSnake,snakeGame.speed);
      gameTimers.push(snakeGame.loop);
    }
  }else{
    snakeGame.snake.pop();
  }
  drawSnake();
}
function drawSnake(dead=false){
  const ctx=snakeGame.ctx,c=snakeGame;
  ctx.fillStyle='#0a0f1e';
  ctx.fillRect(0,0,COLS*SZ,ROWS*SZ);
  for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++){
    if((x+y)%2===0){ctx.fillStyle='rgba(255,255,255,.025)';ctx.fillRect(x*SZ,y*SZ,SZ,SZ);}
  }
  // food glow
  ctx.save();
  ctx.shadowColor='#fbbf24';ctx.shadowBlur=12;
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();
  ctx.arc(c.food.x*SZ+SZ/2,c.food.y*SZ+SZ/2,SZ/2-2,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
  // snake
  c.snake.forEach((s,i)=>{
    const ratio=i/c.snake.length;
    ctx.save();
    if(dead){ctx.fillStyle=`rgba(239,68,68,${1-ratio*.6})`}
    else{
      const r=Math.round((1-ratio)*0+(ratio)*0);
      const g=Math.round((1-ratio)*210+(ratio)*100);
      const b=Math.round((1-ratio)*255+(ratio)*255);
      ctx.fillStyle=`rgb(${r},${g},${b})`;
      ctx.shadowColor=i===0?'#00d2ff':'transparent';
      ctx.shadowBlur=i===0?10:0;
    }
    const pad=i===0?1:2;
    ctx.beginPath();
    ctx.roundRect(s.x*SZ+pad,s.y*SZ+pad,SZ-pad*2,SZ-pad*2,4);
    ctx.fill();
    ctx.restore();
  });
  // eyes
  if(c.snake.length>0){
    const h=c.snake[0];
    ctx.fillStyle='white';
    const d=c.dir;
    const ex=d.x===0?4:d.x>0?12:4;
    const ey=d.y===0?4:d.y>0?12:4;
    ctx.beginPath();ctx.arc(h.x*SZ+ex,h.y*SZ+ey,2,0,Math.PI*2);ctx.fill();
  }
}

let rState='idle',rStart=0,rBest=Infinity,rHist=[],rTimeout;

function rClick(){
  if(rState==='idle'){
    rState='wait';

    pad.className='rpad wait';

    gt('rMsg').textContent='Жди зелёного...';

      rState='go';

    },1500+Math.random()*3000);

    clearTimeout(rTimeout);
    rState='idle';
    const pad=gt('rPad');
    pad.className='rpad idle';pad.textContent='👆';
    gt('rMsg').textContent='Слишком рано! Попробуй снова.';
    playFail();
  }else if(rState==='go'){
    const ms=Date.now()-rStart;
    rState='idle';
    const pad=gt('rPad');
    pad.className='rpad idle';pad.textContent='👆';
    gt('rLastEl').textContent=ms+'ms';
    gt('rMsg').textContent=ms<200?'🚀 Молния!':ms<300?'⚡ Отлично!':ms<500?'👍 Неплохо':'🐢 Медленно';
    if(ms<rBest){rBest=ms;sls('rBest',ms);gt('rBestEl').textContent=ms+'ms';toast('🏆 Новый рекорд: '+ms+'ms!');playSuccess();}
    else playClick();
    rHist.unshift(ms);if(rHist.length>5)rHist.pop();
    const h=gt('rHist');
    if(h)h.innerHTML=rHist.map((t,i)=>`<div class="r-chip ${t===rBest?'best':''}">${t}ms</div>`).join('');
  }
}

// ╔══════════════════════════╗
// ║       DICE BATTLE        ║
// ╚══════════════════════════╝
let diceScore={p:0,ai:0},diceTotal=0;
const DFACES=['⚀','⚁','⚂','⚃','⚄','⚅'];
function initDice(){
  diceScore={p:0,ai:0};diceTotal=0;
  setHTML(`
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="dPScore">0</div><div class="stat-lbl">Ты</div></div>
      <div class="stat-box"><div class="stat-val" id="dRounds">0</div><div class="stat-lbl">Раундов</div></div>
      <div class="stat-box"><div class="stat-val" id="dAiScore">0</div><div class="stat-lbl">ИИ</div></div>
    </div>
    <div class="dice-arena">
      <div class="dice-player"><div class="dp-name">👤 Ты</div><div class="die" id="dP">🎲</div></div>
      <div class="vs">VS</div>
      <div class="dice-player"><div class="dp-name">🤖 ИИ</div><div class="die" id="dAi">🎲</div></div>
    </div>
    <div class="dice-msg" id="dMsg">Нажми кубик чтобы бросить</div>
    <button class="btn" id="dRollBtn" onclick="rollBattle()">🎲 Бросить!</button>
    <button class="btn btn-ghost btn-sm" onclick="initDice()">🔄 Сброс</button>
  `);
  gt('dP').onclick=rollBattle;
}
function rollBattle(){
  const btn=gt('dRollBtn');
  btn.disabled=true;
  const pEl=gt('dP'),aiEl=gt('dAi');
  pEl.classList.add('roll');aiEl.classList.add('roll');
  playTone(600,'square',.15,.2);
  let steps=8,i=0;
  const anim=setInterval(()=>{
    pEl.textContent=DFACES[Math.floor(Math.random()*6)];
    aiEl.textContent=DFACES[Math.floor(Math.random()*6)];
    if(++i>=steps){
      clearInterval(anim);
      const pVal=Math.floor(Math.random()*6)+1;
      const aiVal=Math.floor(Math.random()*6)+1;
      pEl.textContent=DFACES[pVal-1];
      aiEl.textContent=DFACES[aiVal-1];
      pEl.classList.remove('roll');aiEl.classList.remove('roll');
      diceTotal++;
      gt('dRounds').textContent=diceTotal;
      let msg;
      if(pVal>aiVal){diceScore.p++;msg=`🏆 Ты победил! (${pVal} > ${aiVal})`;playSuccess();spawnBurst(200,300,6);}
      else if(aiVal>pVal){diceScore.ai++;msg=`🤖 ИИ победил (${aiVal} > ${pVal})`;playFail();}
      else{msg=`🤝 Ничья! (${pVal} = ${aiVal})`;playTone(440,'sine',.15,.2);}
      gt('dMsg').textContent=msg;
      gt('dPScore').textContent=diceScore.p;
      gt('dAiScore').textContent=diceScore.ai;
      btn.disabled=false;
    }
  },60);
}
</script>
